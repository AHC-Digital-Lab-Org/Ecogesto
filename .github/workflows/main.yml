name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  call-ops-workflow:
    # Invoca el workflow reutilizable central de la asociación (asociacion-ops).
    # Construye el frontend (npm run build -> ./dist) y lo despliega a Netlify.
    uses: AHC-Digital-Lab-Org/asociacion-ops/.github/workflows/netlify-reusable.yml@main
    with:
      language: 'node'
      node_version: '24'
    secrets: inherit # Pasa NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID automáticamente
